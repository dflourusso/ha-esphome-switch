name: CI

on:
  pull_request:
    paths:
      - '*.yaml'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
    paths:
      - '*.yaml'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Building ${{ matrix.file }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file:
          - dfltech-switch
          - dfltech-switch.factory
          - dfltech-switch.dev
    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Create secrets for dev build
        if: matrix.file == 'dfltech-switch.dev'
        run: |
          cp secrets.template.yaml secrets.yaml

      - name: ESPHome compile ${{ matrix.file }}
        uses: esphome/build-action@4ef4722a2935eac47b7e227fe0e1f8e0f8afcc42 # v7.3.0
        with:
          yaml-file: ${{ matrix.file }}.yaml
          version: stable
