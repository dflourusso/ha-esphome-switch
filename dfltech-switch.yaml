esphome:
  name: dfltech-switch
  friendly_name: DFLTech Switch
  name_add_mac_suffix: true
  min_version: 2026.6.0

esp8266:
  board: nodemcuv2

# RX (GPIO3) is used for key 6; disable UART so serial does not conflict.
logger:
  baud_rate: 0

api:

wifi:
  ap:
    password: "dfltech-setup"
    ap_timeout: 0s

captive_portal:

switch:
  - platform: factory_reset
    id: factory_reset_switch
    internal: true

binary_sensor:
  - platform: gpio
    id: flash_button
    internal: true
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    on_click:
      - min_length: 10s
        max_length: 20s
        then:
          - switch.turn_on: factory_reset_switch


  ###############################################################################
  # KEY 1 — D1 / GPIO5
  ###############################################################################

  - platform: gpio
    id: key_1
    internal: true
    pin:
      number: GPIO5
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_multi_click:
      - timing:
          - ON for at most 250ms
          - OFF for at least 250ms
        then:
          - homeassistant.event:
              event: esphome.dfltech_switch
              data:
                key: "1"
                action: single
      - timing:
          - ON for at most 250ms
          - OFF for at most 250ms
          - ON for at most 250ms
          - OFF for at least 250ms
        then:
          - homeassistant.event:
              event: esphome.dfltech_switch
              data:
                key: "1"
                action: double
      - timing:
          - ON for at least 1.2s
        then:
          - homeassistant.event:
              event: esphome.dfltech_switch
              data:
                key: "1"
                action: hold

