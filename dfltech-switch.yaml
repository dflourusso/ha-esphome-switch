esphome:
  name: dfltech-switch
  friendly_name: DFLTech Switch
  name_add_mac_suffix: true
  min_version: 2026.6.0

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Super Mini uses native USB for serial (USB-C).
logger:
  hardware_uart: USB_SERIAL_JTAG

api:

wifi:
  ap:
    password: "dfltech-setup"
    ap_timeout: 0s

captive_portal:

packages:
  key_1: !include
    file: key.yaml
    vars:
      key: "1"
      pin: GPIO0
  key_2: !include
    file: key.yaml
    vars:
      key: "2"
      pin: GPIO1
  key_3: !include
    file: key.yaml
    vars:
      key: "3"
      pin: GPIO3
  key_4: !include
    file: key.yaml
    vars:
      key: "4"
      pin: GPIO4
  key_5: !include
    file: key.yaml
    vars:
      key: "5"
      pin: GPIO5
  key_6: !include
    file: key.yaml
    vars:
      key: "6"
      pin: GPIO6

switch:
  - platform: factory_reset
    id: factory_reset_switch
    internal: true

binary_sensor:
  # BOOT button on Super Mini (GPIO9)
  - platform: gpio
    id: boot_button
    internal: true
    pin:
      number: GPIO9
      mode:
        input: true
        pullup: true
      inverted: true
    on_click:
      - min_length: 10s
        max_length: 20s
        then:
          - switch.turn_on: factory_reset_switch
